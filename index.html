<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#8B0000">
<title>Chifa Suki – Pedidos</title>
<style>
/* ─── VARIABLES DE COLOR CHIFA SUKI ─── */
:root {
  --bg: #f5f4f0; 
  --brand: #8B0000; /* Rojo Principal */
  --brand-dark: #4a0000; 
  --white: #ffffff;
  --accent: #B8860B; /* Dorado para botones secundarios */
  --text: #111;
  --border: rgba(0,0,0,0.08);
}

/* ─── LOGIN PERSONALIZADO ─── */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--brand); /* Fondo Rojo según preferencia */
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
  color: var(--white);
}

.login-btn { 
  width:100%; padding:14px; 
  background: var(--accent); 
  color: var(--white); 
  border:none; border-radius:10px; 
  font-weight:800; text-transform:uppercase; 
}

/* ─── TOPBAR ─── */
.topbar { 
  background: var(--brand); 
  color: var(--white); 
  padding:0 12px; height:52px; 
  display:flex; align-items:center; gap:10px; 
}
.hamburger svg { stroke: var(--white); }

/* ─── MESAS ─── */
.mesa-card.ocupada { 
  background: var(--brand); 
  border-color: var(--brand); 
}
.mesa-card.ocupada .mesa-num, 
.mesa-card.ocupada .mesa-info { color: var(--white); }

/* ─── BOTONES DE IMPRESIÓN (CX58D) ─── */
.btn-print-salon { 
  background: #333; color: var(--white); 
  padding: 9px; border-radius: 8px; font-size: 11px; 
}
.btn-print-cocina { 
  background: var(--brand); color: var(--white); 
  padding: 9px; border-radius: 8px; font-size: 11px; 
}

/* ─── SECCIÓN DE PAGOS (YAPE/EFECTIVO) ─── */
.cobro-metodo.active { 
  background: var(--brand); 
  color: var(--white); 
}
</style>
</head>
<body>

<!-- LOGIN CON IDENTIDAD CHIFA SUKI -->
<div id="login-screen">
  <div style="text-align:center;">
    <img src="icon-192.png" style="width:96px; border-radius:50%; border:2px solid var(--white); margin-bottom:16px;">
    <div style="font-size:24px; font-weight:800;">Chifa Suki</div>
    <div style="font-size:10px; opacity:0.7; letter-spacing:2px; margin-bottom:20px;">SISTEMA DE PEDIDOS</div>
    
    <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; width:300px;">
        <input type="email" placeholder="Usuario" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
        <input type="password" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:none;">
        <button class="login-btn">Ingresar</button>
    </div>
    <div style="font-size:10px; margin-top:20px; opacity:0.5;">© Chifa Suki · RUC 10715703446</div>
  </div>
</div>

<div class="app">
  <div class="topbar">
    <button class="hamburger" style="background:none; border:none;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 12H21M3 6H21M3 18H21" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>
    <h1 style="font-size:18px;">Panel de Control</h1>
  </div>

  <!-- Botones de Impresión para Comandas -->
  <div class="print-btns" style="padding:10px; display:flex; gap:10px;">
    <button class="btn-print-salon">Comprobante Salón</button>
    <button class="btn-print-cocina">Comanda Cocina</button>
  </div>
</div>

</body>
</html>
