<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chifa Suki – Sistema de Pedidos</title>
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --brand: #8B0000; /* Rojo Chifa Suki */
            --bg: #f5f4f0;
            --card: #ffffff;
            --text: #111111;
            --border: rgba(0,0,0,0.08);
            --radius: 12px;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .topbar { background: #fff; height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--brand); position: sticky; top: 0; z-index: 100; }
        .topbar h1 { font-size: 20px; color: var(--brand); font-weight: 800; }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        
        /* Grid de Mesas */
        .mesas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .mesa-card { background: #fff; border-radius: var(--radius); padding: 25px 10px; text-align: center; border: 1.5px solid var(--border); transition: 0.2s; cursor: pointer; }
        .mesa-card.ocupada { background: var(--brand); color: #fff; border-color: var(--brand); }
        .mesa-num { font-size: 26px; font-weight: 900; }
        .mesa-status { font-size: 12px; margin-top: 5px; opacity: 0.8; }

        /* Botón Para Llevar */
        .btn-llevar { background: #fff; color: var(--brand); border: 2px solid var(--brand); padding: 15px; width: 100%; border-radius: var(--radius); margin-top: 20px; font-weight: 700; font-size: 16px; }

        /* Estilos Pedido */
        .pantalla { display: none; }
        .pantalla.active { display: block; }
        .btn-accion { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .btn-rojo { background: var(--brand); color: #fff; }
        .btn-blanco { background: #fff; color: var(--brand); border: 1px solid var(--brand); }
    </style>
</head>
<body>

<div class="topbar">
    <h1>CHIFA SUKI</h1>
</div>

<div class="container">
    <!-- Pantalla de Inicio (Mesas) -->
    <div id="pantalla-mesas" class="pantalla active">
        <div class="mesas-grid" id="grid-mesas">
            <!-- Mesas 1 a 9 generadas por JS -->
        </div>
        <button class="btn-llevar" onclick="abrirMesa('Llevar')">ORDEN PARA LLEVAR</button>
    </div>

    <!-- Pantalla de Pedido -->
    <div id="pantalla-pedido" class="pantalla">
        <h2 id="titulo-mesa" style="margin-bottom: 15px;">Mesa --</h2>
        <div id="lista-pedido" style="background: #fff; padding: 15px; border-radius: 12px; min-height: 100px; border: 1px solid var(--border);">
            <!-- Aquí aparecerán los platos -->
            <p style="color: #666;">Selecciona platos para agregar...</p>
        </div>
        
        <button class="btn-accion btn-rojo" onclick="guardarPedido()">CONFIRMAR PEDIDO</button>
        <button class="btn-accion btn-blanco" onclick="regresar()">VOLVER A MESAS</button>
    </div>
</div>

<script>
    // Configuración real obtenida de tus capturas
    const firebaseConfig = {
      apiKey: "AIzaSyBvVbayJesWNSJ64HayDOfBfzu4cy3SnIM",
      authDomain: "chifa-suki.firebaseapp.com",
      projectId: "chifa-suki",
      storageBucket: "chifa-suki.firebasestorage.app",
      messagingSenderId: "210680785195",
      appId: "1:210680785195:web:7d96d22057d849e0e33d6e",
      measurementId: "G-1EH09XQVKS"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let mesaActual = null;

    // Crear las 9 mesas
    function initMesas() {
        const grid = document.getElementById('grid-mesas');
        grid.innerHTML = '';
        for(let i=1; i<=9; i++) {
            grid.innerHTML += `
                <div class="mesa-card" id="mesa-${i}" onclick="abrirMesa(${i})">
                    <div class="mesa-num">${i}</div>
                    <div class="mesa-status" id="status-${i}">Libre</div>
                </div>
            `;
        }
        escucharCambios();
    }

    // Escuchar Firestore en tiempo real
    function escucharCambios() {
        db.collection("mesas").onSnapshot((snapshot) => {
            snapshot.forEach((doc) => {
                const data = doc.data();
                const mesaDiv = document.getElementById(`mesa-${doc.id}`);
                const statusText = document.getElementById(`status-${doc.id}`);
                
                if (mesaDiv && data.ocupada) {
                    mesaDiv.classList.add('ocupada');
                    statusText.innerText = "Ocupada";
                } else if (mesaDiv) {
                    mesaDiv.classList.remove('ocupada');
                    statusText.innerText = "Libre";
                }
            });
        });
    }

    function abrirMesa(id) {
        mesaActual = id;
        document.getElementById('titulo-mesa').innerText = "Mesa: " + id;
        document.getElementById('pantalla-mesas').classList.remove('active');
        document.getElementById('pantalla-pedido').classList.add('active');
    }

    async function guardarPedido() {
        if(!mesaActual) return;
        
        try {
            await db.collection("mesas").doc(mesaActual.toString()).set({
                ocupada: true,
                fecha: firebase.firestore.FieldValue.serverTimestamp(),
                total: 0 // Aquí conectarás con tu lógica de precios después
            });
            alert("Pedido enviado a cocina");
            regresar();
        } catch (error) {
            console.error("Error: ", error);
        }
    }

    function regresar() {
        document.getElementById('pantalla-pedido').classList.remove('active');
        document.getElementById('pantalla-mesas').classList.add('active');
    }

    // Iniciar app
    initMesas();
</script>

</body>
</html>
