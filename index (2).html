<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#8B0000">
    <title>Chifa Suki – Pedidos</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <style>
        /* Estilos base unificados con tu diseño Vercel */
        :root {
            --brand: #8B0000; /* Rojo Chifa Suki */
            --bg: #f5f4f0;
            --card: #fff;
            --text: #111;
            --border: rgba(0,0,0,0.08);
            --radius: 12px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* Login Screen */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--brand);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
        }
        .login-input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; margin-bottom: 12px; }
        .login-btn { width: 100%; padding: 14px; background: #fff; color: var(--brand); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* App Structure */
        .app { display: flex; flex-direction: column; height: 100vh; display: none; }
        .topbar { background: #fff; height: 56px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border); gap: 12px; }
        .topbar h1 { font-size: 18px; font-weight: 800; color: var(--brand); }

        /* Mesas Grid */
        .screen { flex: 1; overflow-y: auto; padding: 12px; display: none; }
        .screen.active { display: block; }
        .mesas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .mesa-card { background: #fff; border-radius: var(--radius); padding: 20px 10px; text-align: center; border: 1.5px solid var(--border); transition: 0.2s; }
        .mesa-card.ocupada { background: var(--brand); color: #fff; border-color: var(--brand); }
        .mesa-num { font-size: 24px; font-weight: 900; }

        /* Order Panel */
        .pedido-container { display: flex; height: 100%; flex-direction: column; }
        .menu-scroll { flex: 1; overflow-y: auto; }
        .order-col { background: #fff; border-top: 2px solid var(--border); padding: 16px; max-height: 40vh; overflow-y: auto; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: #fff; width: 90%; max-width: 400px; border-radius: 16px; padding: 20px; }
        
        /* Botones Acción */
        .btn-confirmar { background: var(--brand); color: #fff; width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 700; margin-top: 10px; }
        .btn-cobrar { background: #2e7d32; color: #fff; width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 700; }
    </style>
</head>
<body>

<!-- Pantalla de Login -->
<div id="login-screen">
    <h1 style="color:white; margin-bottom: 20px;">CHIFA SUKI</h1>
    <input id="login-email" type="email" class="login-input" placeholder="Correo">
    <input id="login-pass" type="password" class="login-input" placeholder="Contraseña">
    <button class="login-btn" onclick="handleLogin()">INGRESAR</button>
</div>

<!-- Estructura Principal -->
<div class="app" id="main-app">
    <div class="topbar">
        <h1>Chifa Suki</h1>
        <div id="user-info" style="font-size: 12px; margin-left: auto;">Conectado</div>
    </div>

    <!-- Pantalla Mesas -->
    <div class="screen active" id="scr-mesas">
        <div class="mesas-grid" id="grid-mesas">
            <!-- Mesas 1 a 9 se generan por JS -->
        </div>
        <div style="margin-top: 20px;">
            <button class="mesa-card" style="width: 100%;" onclick="seleccionarMesa('Llevar')">ORDEN PARA LLEVAR</button>
        </div>
    </div>

    <!-- Pantalla Pedido -->
    <div class="screen" id="scr-pedido">
        <div class="pedido-container">
            <div id="mesa-actual-label" style="font-weight: 800; padding-bottom: 10px;">Mesa: --</div>
            <div class="menu-scroll" id="menu-items">
                <!-- Items del menú -->
            </div>
            <div class="order-col" id="order-list">
                <h3>Tu Pedido</h3>
                <div id="items-agregados"></div>
                <div id="total-pedido" style="font-size: 20px; font-weight: 900; margin-top: 10px;">Total: S/ 0.00</div>
                <button class="btn-confirmar" onclick="guardarPedido()">CONFIRMAR PEDIDO</button>
                <button class="btn-cobrar" style="margin-top: 5px;" onclick="abrirCobro()">COBRAR</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración Firebase (Reemplazar con tus credenciales)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "chifa-suki.firebaseapp.com",
        projectId: "chifa-suki",
        storageBucket: "chifa-suki.appspot.com",
        messagingSenderId: "TU_ID",
        appId: "TU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let mesaSeleccionada = null;
    let carrito = [];

    // Lógica de Login
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                initApp();
            })
            .catch(err => alert("Error: " + err.message));
    }

    function initApp() {
        generarMesas();
        escucharMesas();
    }

    function generarMesas() {
        const grid = document.getElementById('grid-mesas');
        grid.innerHTML = '';
        for(let i=1; i<=9; i++) {
            grid.innerHTML += `
                <div class="mesa-card" id="mesa-${i}" onclick="seleccionarMesa(${i})">
                    <div class="mesa-num">${i}</div>
                    <div class="mesa-status" id="status-${i}">Libre</div>
                </div>
            `;
        }
    }

    function seleccionarMesa(id) {
        mesaSeleccionada = id;
        document.getElementById('mesa-actual-label').innerText = "Mesa: " + id;
        document.getElementById('scr-mesas').classList.remove('active');
        document.getElementById('scr-pedido').classList.add('active');
        cargarPedidoExistente(id);
    }

    // Escuchar cambios en tiempo real desde Firestore
    function escucharMesas() {
        db.collection('mesas').onSnapshot(snapshot => {
            snapshot.forEach(doc => {
                const data = doc.data();
                const mesaEl = document.getElementById(`mesa-${doc.id}`);
                const statusEl = document.getElementById(`status-${doc.id}`);
                if(mesaEl && data.ocupada) {
                    mesaEl.classList.add('ocupada');
                    statusEl.innerText = "S/ " + data.total.toFixed(2);
                } else if(mesaEl) {
                    mesaEl.classList.remove('ocupada');
                    statusEl.innerText = "Libre";
                }
            });
        });
    }

    async function guardarPedido() {
        if(!mesaSeleccionada) return;
        const total = carrito.reduce((sum, item) => sum + item.precio, 0);
        
        await db.collection('mesas').doc(mesaSeleccionada.toString()).set({
            ocupada: true,
            items: carrito,
            total: total,
            ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        alert("Pedido guardado en Mesa " + mesaSeleccionada);
        irAMesas();
    }

    function irAMesas() {
        document.getElementById('scr-pedido').classList.remove('active');
        document.getElementById('scr-mesas').classList.add('active');
    }

    // Inicializar al cargar
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            initApp();
        }
    });

</script>
</body>
</html>
